<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AzwanTech Store</title>
<link rel="stylesheet" href="style.css">
<script defer src="script.js"></script>
</head>
<body>

<section class="hero">
    <h1>AzwanTech Store</h1>
    <p>Jual Laptop & Aksesoris PC Berkualitas</p>
</section>

<section>
    <h2>Produk Laptop</h2>
    <div class="grid">

        <div class="card">
            <img src="images/laptop1.jpg" width="200">
            <h3>Laptop Gaming RTX 3050</h3>
            <p>Rp 12.500.000</p>
            <button onclick="tambahKeCart('Laptop RTX 3050', 12500000)">Tambah ke Cart</button>
        </div>

        <div class="card">
            <img src="images/laptop2.jpg" width="200">
            <h3>Laptop Office i5</h3>
            <p>Rp 7.800.000</p>
            <button onclick="tambahKeCart('Laptop Office i5', 7800000)">Tambah ke Cart</button>
        </div>

    </div>
</section>

<section>
    <h2>Aksesoris PC</h2>
    <div class="grid">

        <div class="card">
            <h3>Mechanical Keyboard RGB</h3>
            <p>Rp 450.000</p>
            <button onclick="tambahKeCart('Keyboard RGB', 450000)">Tambah ke Cart</button>
        </div>

        <div class="card">
            <h3>Mouse Gaming Pro</h3>
            <p>Rp 250.000</p>
            <button onclick="tambahKeCart('Mouse Gaming', 250000)">Tambah ke Cart</button>
        </div>

    </div>
</section>

<section>
    <h2>Keranjang Belanja</h2>
    <ul id="daftarCart"></ul>
    <p id="totalHarga">Total: Rp 0</p>
    <button onclick="checkout()">Checkout via WhatsApp</button>
</section>

<footer>
    © 2026 AzwanTech Store
</footer>

</body>
</html>
